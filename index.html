<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRExpress | Free QR Code Generator</title>
    <meta name="description" content="Create beautiful, customizable QR codes for free. No registration required.">
    <meta name="robots" content="index, follow">
    
    <!-- Hreflang Tags -->
    <link rel="alternate" hreflang="en" href="https://qrexpress.org/en/">
    <link rel="alternate" hreflang="it" href="https://qrexpress.org/it/">
    <link rel="alternate" hreflang="ro" href="https://qrexpress.org/ro/">
    <link rel="alternate" hreflang="ru" href="https://qrexpress.org/ru/">
    <link rel="alternate" hreflang="uk" href="https://qrexpress.org/uk/">
    <link rel="alternate" hreflang="x-default" href="https://qrexpress.org/en/">
    
    <link rel="canonical" href="https://qrexpress.org/">
    <link rel="icon" type="image/svg+xml" href="./resources/logo.svg">
    
    <script>
        // Detect browser language and redirect to appropriate subdirectory
        (function() {
            var supported = {'en':1, 'it':1, 'ro':1, 'ru':1, 'uk':1};
            var stored = null;
            try { stored = localStorage.getItem('qrexpress_lang'); } catch(e) {}
            
            if (stored && supported[stored]) {
                window.location.replace('/' + stored + '/');
                return;
            }
            
            var langs = navigator.languages || [navigator.language || navigator.userLanguage || 'en'];
            for (var i = 0; i < langs.length; i++) {
                var code = langs[i].toLowerCase().split('-')[0];
                if (supported[code]) {
                    window.location.replace('/' + code + '/');
                    return;
                }
            }
            window.location.replace('/en/');
        })();
    </script>
    
    <!-- Fallback for no-JS -->
    <noscript>
        <meta http-equiv="refresh" content="0;url=/en/">
    </noscript>
</head>
<body>
    <p>Redirecting... <a href="/en/">Click here if not redirected</a></p>
</body>
</html>
